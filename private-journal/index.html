<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Online Private Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
    "firebase/app-compat": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js",
    "firebase/analytics": "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js",
    "firebase/app-check": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app-check.js",
    "firebase/performance": "https://www.gstatic.com/firebasejs/10.12.2/firebase-performance.js",
    "firebase/remote-config": "https://www.gstatic.com/firebasejs/10.12.2/firebase-remote-config.js",
    "firebase/installations": "https://www.gstatic.com/firebasejs/10.12.2/firebase-installations.js",
    "firebase/database": "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js",
    "firebase/storage": "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js",
    "firebase/messaging": "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js",
    "firebase/functions": "https://www.gstatic.com/firebasejs/10.12.2/firebase-functions.js"
  }
}
</script>
</head>
<body>

<!-- ============ AUTH SCREEN ============ -->
<section id="auth-screen" class="screen">
  <div class="auth-wrap">
    <div class="brand">
      <span class="brand-mark">§</span>
      <h1>Online Private Journal</h1>
      <p class="tagline">A quiet, private place to write.</p>
    </div>

    <div class="auth-card" role="region" aria-live="polite">
      <div class="auth-tabs">
        <button class="auth-tab active" data-mode="signin" type="button">Sign in</button>
        <button class="auth-tab" data-mode="signup" type="button">Create account</button>
      </div>

      <form id="auth-form" novalidate>
        <label class="field">
          <span>Email</span>
          <input type="email" id="email" autocomplete="email" required />
        </label>
        <label class="field">
          <span>Password</span>
          <input type="password" id="password" autocomplete="current-password" minlength="8" required />
        </label>
        <p id="auth-error" class="auth-error" hidden></p>
        <button type="submit" class="btn-primary" id="auth-submit">Sign in</button>
      </form>

      <button id="reset-password" class="link-btn" type="button">Forgot password?</button>
    </div>

    <p class="auth-foot">Entries are private to your account and stored securely per-user in Firestore.</p>
  </div>
</section>

<!-- ============ JOURNAL SCREEN ============ -->
<section id="app-screen" class="screen" hidden>
  <header class="topbar">
    <div class="topbar-brand">
      <span class="brand-mark small">§</span>
      <span class="brand-name">Marginalia</span>
    </div>
    <div class="topbar-actions">
      <span id="user-email" class="user-email"></span>
      <button id="sign-out" class="btn-ghost">Sign out</button>
    </div>
  </header>

  <div class="app-body">
    <!-- Entry list -->
    <aside class="entry-list-pane">
      <div class="entry-list-head">
        <h2>Entries</h2>
        <button id="new-entry" class="btn-primary small">+ New</button>
      </div>
      <label class="search-field">
        <input type="text" id="search-entries" placeholder="Search entries…" />
      </label>
      <ul id="entry-list" class="entry-list" aria-live="polite"></ul>
      <p id="empty-state" class="empty-state" hidden>No entries yet.<br>Start your first page.</p>
    </aside>

    <!-- Editor -->
    <main class="editor-pane">
      <div id="editor-empty" class="editor-empty">
        <p>Select an entry, or start a new page.</p>
      </div>

      <article id="editor" class="page" hidden>
        <div class="page-meta">
          <input type="text" id="entry-title" class="entry-title" placeholder="Untitled entry" />
          <span id="entry-date" class="entry-date"></span>
        </div>
        <textarea id="entry-body" class="entry-body" placeholder="Begin writing…"></textarea>
        <div class="page-actions">
          <span id="save-status" class="save-status">Saved</span>
          <button id="delete-entry" class="btn-danger">Delete</button>
        </div>
      </article>
    </main>
  </div>
</section>

<div id="toast" class="toast" hidden></div>

<script type="module" src="js/firebase-config.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
