<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pong — vs Computer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #eee;
  }

  h1 {
    letter-spacing: 8px;
    margin-bottom: 10px;
    color: #f5f5f5;
  }

  #info {
    margin-bottom: 12px;
    color: #888;
    font-size: 14px;
  }

  canvas {
    background: #000;
    border: 3px solid #444;
    box-shadow: 0 0 25px rgba(255,255,255,0.1);
  }

  #scoreboard {
    display: flex;
    gap: 60px;
    font-size: 32px;
    margin-bottom: 10px;
  }

  .label {
    font-size: 14px;
    color: #777;
    text-align: center;
    display: block;
  }

  #nav {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 100;
  }

  #nav a {
    color: #0ff;
    text-decoration: none;
    font-size: 14px;
  }

  #nav a:hover {
    text-decoration: underline;
  }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 10;
  }

  #overlay.hidden { display: none; }

  #overlayText {
    font-size: 22px;
  }

  #difficultyPicker {
    display: flex;
    gap: 10px;
  }

  .diffBtn {
    background: #222;
    color: #eee;
    border: 2px solid #444;
    padding: 10px 20px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 4px;
    letter-spacing: 1px;
  }

  .diffBtn:hover { border-color: #888; }

  .diffBtn.selected {
    background: #eee;
    color: #111;
    border-color: #eee;
  }

  button#startBtn {
    background: #eee;
    color: #111;
    border: none;
    padding: 10px 24px;
    font-size: 16px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 4px;
  }

  button#startBtn:hover { background: #fff; }

  #currentDiff {
    color: #666;
    font-size: 13px;
    margin-top: -6px;
  }
</style>
</head>
<body>

<h1>PONG</h1>
<div id="info">W / S — move your paddle &nbsp;&nbsp;|&nbsp;&nbsp; first to 7 wins</div>

<div id="scoreboard">
  <div><span id="scoreLeft">0</span><span class="label">YOU</span></div>
  <div><span id="scoreRight">0</span><span class="label">COMPUTER</span></div>
</div>

<div style="position: relative;">
  <canvas id="game" width="700" height="440"></canvas>
  <div id="overlay">
    <div id="overlayText" style="font-size: 24px;">Choose Difficulty</div>
    <div id="difficultyPicker">
      <button class="diffBtn" data-level="easy">EASY</button>
      <button class="diffBtn selected" data-level="medium">MEDIUM</button>
      <button class="diffBtn" data-level="hard">HARD</button>
      <button class="diffBtn" data-level="insane">INSANE</button>
    </div>
    <button id="startBtn">Start Game</button>
  </div>
</div>
<div id="currentDiff">Difficulty: Medium</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = canvas.width;
const H = canvas.height;

const PADDLE_W = 12;
const PADDLE_H = 90;
const BALL_SIZE = 10;
const WIN_SCORE = 7;

let leftPaddle = { x: 20, y: H/2 - PADDLE_H/2 };
let rightPaddle = { x: W - 20 - PADDLE_W, y: H/2 - PADDLE_H/2 };
let ball = { x: W/2, y: H/2, dx: 5, dy: 3, speed: 5 };

let scoreLeft = 0;
let scoreRight = 0;
let running = false;
let gameOver = false;

const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup', e => { keys[e.key] = false; });

// --- Difficulty settings ---
// aiSpeed: max pixels/frame the AI paddle can move
// reaction: 0-1, chance per frame the AI "reacts" to the ball's current position (lower = laggier)
// error: random targeting offset added to where the AI aims on its paddle
// predictive: whether the AI predicts bounce trajectory or just tracks the ball's current y
const DIFFICULTIES = {
  easy:    { aiSpeed: 3.0, reaction: 0.55, error: 55, predictive: false },
  medium:  { aiSpeed: 4.5, reaction: 0.8,  error: 30, predictive: false },
  hard:    { aiSpeed: 6.5, reaction: 1.0,  error: 12, predictive: true  },
  insane:  { aiSpeed: 9.0, reaction: 1.0,  error: 2,  predictive: true  }
};

let currentDifficulty = 'medium';
let aiTargetY = H / 2;

const scoreLeftEl = document.getElementById('scoreLeft');
const scoreRightEl = document.getElementById('scoreRight');
const overlay = document.getElementById('overlay');
const overlayText = document.getElementById('overlayText');
const startBtn = document.getElementById('startBtn');
const currentDiffLabel = document.getElementById('currentDiff');
const diffBtns = document.querySelectorAll('.diffBtn');

diffBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    diffBtns.forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    currentDifficulty = btn.dataset.level;
  });
});

function labelFor(level) {
  return level.charAt(0).toUpperCase() + level.slice(1);
}

function resetBall(direction) {
  ball.x = W / 2;
  ball.y = H / 2;
  ball.speed = 5;
  const angle = (Math.random() * 0.6 - 0.3);
  ball.dx = direction * ball.speed * Math.cos(angle);
  ball.dy = ball.speed * Math.sin(angle);
}

function resetGame() {
  scoreLeft = 0;
  scoreRight = 0;
  scoreLeftEl.textContent = 0;
  scoreRightEl.textContent = 0;
  leftPaddle.y = H/2 - PADDLE_H/2;
  rightPaddle.y = H/2 - PADDLE_H/2;
  gameOver = false;
  resetBall(Math.random() > 0.5 ? 1 : -1);
}

// Predicts where the ball will be (in y) when it reaches the AI paddle's x,
// accounting for bounces off top/bottom walls.
function predictBallY() {
  let simX = ball.x;
  let simY = ball.y;
  let simDx = ball.dx;
  let simDy = ball.dy;

  if (simDx <= 0) return H / 2; // ball moving away, no need to predict

  // step simulation until it reaches the paddle's x plane
  let guard = 0;
  while (simX < rightPaddle.x && guard < 2000) {
    simX += simDx;
    simY += simDy;
    if (simY <= 0) {
      simY = -simY;
      simDy *= -1;
    } else if (simY >= H) {
      simY = H - (simY - H);
      simDy *= -1;
    }
    guard++;
  }
  return simY;
}

function updateAI() {
  const diff = DIFFICULTIES[currentDifficulty];

  // AI "decides" on a target periodically based on reaction chance,
  // simulating slower players not tracking every frame perfectly.
  if (Math.random() < diff.reaction || diff.predictive) {
    const rawTarget = diff.predictive ? predictBallY() : ball.y;
    aiTargetY = rawTarget + (Math.random() * 2 - 1) * diff.error;
  }

  const paddleCenter = rightPaddle.y + PADDLE_H / 2;
  const diffY = aiTargetY - paddleCenter;

  if (Math.abs(diffY) > 4) {
    const move = Math.sign(diffY) * Math.min(diff.aiSpeed, Math.abs(diffY));
    rightPaddle.y += move;
  }

  rightPaddle.y = Math.max(0, Math.min(H - PADDLE_H, rightPaddle.y));
}

function update() {
  if (!running) return;

  // Player paddle movement
  const paddleSpeed = 6;
  if (keys['w'] || keys['W']) leftPaddle.y -= paddleSpeed;
  if (keys['s'] || keys['S']) leftPaddle.y += paddleSpeed;
  leftPaddle.y = Math.max(0, Math.min(H - PADDLE_H, leftPaddle.y));

  updateAI();

  // Ball movement
  ball.x += ball.dx;
  ball.y += ball.dy;

  // Top/bottom wall collision
  if (ball.y - BALL_SIZE/2 <= 0) {
    ball.y = BALL_SIZE/2;
    ball.dy *= -1;
  } else if (ball.y + BALL_SIZE/2 >= H) {
    ball.y = H - BALL_SIZE/2;
    ball.dy *= -1;
  }

  // Left paddle (player) collision
  if (ball.x - BALL_SIZE/2 <= leftPaddle.x + PADDLE_W &&
      ball.x - BALL_SIZE/2 >= leftPaddle.x &&
      ball.y >= leftPaddle.y &&
      ball.y <= leftPaddle.y + PADDLE_H &&
      ball.dx < 0) {
    ball.x = leftPaddle.x + PADDLE_W + BALL_SIZE/2;
    const relativeY = (ball.y - (leftPaddle.y + PADDLE_H/2)) / (PADDLE_H/2);
    ball.speed = Math.min(ball.speed + 0.4, 13);
    const angle = relativeY * 0.9;
    ball.dx = ball.speed * Math.cos(angle);
    ball.dy = ball.speed * Math.sin(angle);
  }

  // Right paddle (AI) collision
  if (ball.x + BALL_SIZE/2 >= rightPaddle.x &&
      ball.x + BALL_SIZE/2 <= rightPaddle.x + PADDLE_W &&
      ball.y >= rightPaddle.y &&
      ball.y <= rightPaddle.y + PADDLE_H &&
      ball.dx > 0) {
    ball.x = rightPaddle.x - BALL_SIZE/2;
    const relativeY = (ball.y - (rightPaddle.y + PADDLE_H/2)) / (PADDLE_H/2);
    ball.speed = Math.min(ball.speed + 0.4, 13);
    const angle = relativeY * 0.9;
    ball.dx = -ball.speed * Math.cos(angle);
    ball.dy = ball.speed * Math.sin(angle);
  }

  // Scoring
  if (ball.x < -BALL_SIZE) {
    scoreRight++;
    scoreRightEl.textContent = scoreRight;
    checkWin();
    if (!gameOver) resetBall(1);
  } else if (ball.x > W + BALL_SIZE) {
    scoreLeft++;
    scoreLeftEl.textContent = scoreLeft;
    checkWin();
    if (!gameOver) resetBall(-1);
  }
}

function checkWin() {
  if (scoreLeft >= WIN_SCORE || scoreRight >= WIN_SCORE) {
    gameOver = true;
    running = false;
    const winner = scoreLeft >= WIN_SCORE ? 'You win!' : 'Computer wins!';
    overlayText.textContent = winner;
    startBtn.textContent = 'Play Again';
    overlay.classList.remove('hidden');
  }
}

function drawNet() {
  ctx.strokeStyle = '#333';
  ctx.setLineDash([8, 10]);
  ctx.beginPath();
  ctx.moveTo(W/2, 0);
  ctx.lineTo(W/2, H);
  ctx.stroke();
  ctx.setLineDash([]);
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  drawNet();

  ctx.fillStyle = '#eee';
  ctx.fillRect(leftPaddle.x, leftPaddle.y, PADDLE_W, PADDLE_H);
  ctx.fillRect(rightPaddle.x, rightPaddle.y, PADDLE_W, PADDLE_H);

  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_SIZE/2, 0, Math.PI * 2);
  ctx.fill();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

startBtn.addEventListener('click', () => {
  resetGame();
  running = true;
  overlay.classList.add('hidden');
  currentDiffLabel.textContent = `Difficulty: ${labelFor(currentDifficulty)}`;
});

// Initial draw before game starts
draw();
loop();
</script>

<div id="nav">
  <a href="index.html">← Back to Home</a>
</div>

</body>
</html>
