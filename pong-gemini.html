<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Pong Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        #gameContainer {
            position: relative;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        canvas {
            background-color: #000;
            display: block;
        }

        .controls {
            margin-top: 15px;
            font-size: 14px;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>PONG</h1>
    <div id="gameContainer">
        <canvas id="pongCanvas" width="800" height="500"></canvas>
    </div>
    <div class="controls">
        <p>Use <b>W / S</b> or <b>Up / Down Arrows</b> to move.</p>
    </div>

    <script>
        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');

        // Game objects
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 10,
            speed: 7,
            velocityX: 7,
            velocityY: 7
        };

        const player = {
            x: 0,
            y: canvas.height / 2 - 50,
            width: 10,
            height: 100,
            score: 0,
            color: '#fff',
            speed: 8
        };

        const ai = {
            x: canvas.width - 10,
            y: canvas.height / 2 - 50,
            width: 10,
            height: 100,
            score: 0,
            color: '#fff',
            speed: 4.5 // Slightly slower than ball to make it beatable
        };

        const net = {
            x: canvas.width / 2 - 1,
            y: 0,
            width: 2,
            height: 10,
            color: '#fff'
        };

        // Keyboard Input State
        const keysPressed = {};

        window.addEventListener('keydown', (e) => {
            keysPressed[e.key] = true;
        });

        window.addEventListener('keyup', (e) => {
            keysPressed[e.key] = false;
        });

        // Draw Functions
        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        }

        function drawCircle(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2, false);
            ctx.closePath();
            ctx.fill();
        }

        function drawText(text, x, y, color) {
            ctx.fillStyle = color;
            ctx.font = '45px "Courier New"';
            ctx.fillText(text, x, y);
        }

        function drawNet() {
            for (let i = 0; i <= canvas.height; i += 15) {
                drawRect(net.x, net.y + i, net.width, net.height, net.color);
            }
        }

        // Reset Ball to Center after a point
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            // Reverse direction
            ball.velocityX = -ball.velocityX;
            ball.speed = 7;
        }

        // Collision detection helper
        function collision(b, p) {
            p.top = p.y;
            p.bottom = p.y + p.height;
            p.left = p.x;
            p.right = p.x + p.width;

            b.top = b.y - b.radius;
            b.bottom = b.y + b.radius;
            b.left = b.x - b.radius;
            b.right = b.x + b.radius;

            return b.right > p.left && b.bottom > p.top && b.left < p.right && b.top < p.bottom;
        }

        // Update Game Logic
        function update() {
            // Player Movement
            if (keysPressed['w'] || keysPressed['ArrowUp']) {
                player.y -= player.speed;
            }
            if (keysPressed['s'] || keysPressed['ArrowDown']) {
                player.y += player.speed;
            }
            
            // Keep player inside canvas boundary
            player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));

            // Simple AI Movement (tracks ball center with slight delay/smoothness)
            let aiTarget = ball.y - (ai.height / 2);
            ai.y += (aiTarget - ai.y) * 0.12; 
            ai.y = Math.max(0, Math.min(canvas.height - ai.height, ai.y));

            // Move Ball
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            // Ball collision with top and bottom walls
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.velocityY = -ball.velocityY;
            }

            // Determine which paddle the ball is moving towards
            let playerPaddle = (ball.x < canvas.width / 2) ? player : ai;

            if (collision(ball, playerPaddle)) {
                // Calculate where the ball hit the paddle (-1 to 1)
                let collidePoint = (ball.y - (playerPaddle.y + playerPaddle.height / 2));
                collidePoint = collidePoint / (playerPaddle.height / 2);

                // Calculate angle in radians (45 degrees max)
                let angleRad = (Math.PI / 4) * collidePoint;

                // X direction depending on which paddle was hit
                let direction = (ball.x < canvas.width / 2) ? 1 : -1;

                // Update velocities based on angle and increase speed slightly
                ball.speed += 0.5;
                ball.velocityX = direction * ball.speed * Math.cos(angleRad);
                ball.velocityY = ball.speed * Math.sin(angleRad);
            }

            // Scoring
            if (ball.x - ball.radius < 0) {
                ai.score++;
                resetBall();
            } else if (ball.x + ball.radius > canvas.width) {
                player.score++;
                resetBall();
            }
        }

        // Render everything to the canvas
        function render() {
            // Clear canvas
            drawRect(0, 0, canvas.width, canvas.height, '#000');

            // Draw elements
            drawNet();
            drawText(player.score, canvas.width / 4, canvas.height / 5, '#fff');
            drawText(ai.score, 3 * canvas.width / 4, canvas.height / 5, '#fff');
            drawRect(player.x, player.y, player.width, player.height, player.color);
            drawRect(ai.x, ai.y, ai.width, ai.height, ai.color);
            drawCircle(ball.x, ball.y, ball.radius, '#fff');
        }

        // Main Game Loop
        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }

        // Start the game loop
        gameLoop();
    </script>
</body>
</html>
