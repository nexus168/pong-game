<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong Game</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

canvas{
    border:4px solid white;
    background:black;
}

#info{
    position:absolute;
    top:20px;
    color:white;
    font-size:24px;
    text-align:center;
    width:100%;
}
</style>
</head>
<body>

<div id="info">
Player: <span id="playerScore">0</span> |
Computer: <span id="cpuScore">0</span><br>
<small>W/S = Move Paddle | First to 10 Wins</small>
</div>

<canvas id="game" width="900" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const playerScoreEl = document.getElementById("playerScore");
const cpuScoreEl = document.getElementById("cpuScore");

const paddleWidth = 15;
const paddleHeight = 100;
const ballSize = 15;

let playerScore = 0;
let cpuScore = 0;

const player = {
    x:20,
    y:canvas.height/2-paddleHeight/2,
    width:paddleWidth,
    height:paddleHeight,
    speed:8
};

const cpu = {
    x:canvas.width-35,
    y:canvas.height/2-paddleHeight/2,
    width:paddleWidth,
    height:paddleHeight,
    speed:5
};

const ball = {
    x:canvas.width/2,
    y:canvas.height/2,
    size:ballSize,
    speed:6,
    dx:6,
    dy:4
};

const keys = {};

document.addEventListener("keydown", e=>{
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e=>{
    keys[e.key.toLowerCase()] = false;
});

function drawRect(x,y,w,h,color){
    ctx.fillStyle=color;
    ctx.fillRect(x,y,w,h);
}

function drawBall(){
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(ball.x,ball.y,ball.size/2,0,Math.PI*2);
    ctx.fill();
}

function drawCenterLine(){
    ctx.setLineDash([10,10]);
    ctx.strokeStyle="gray";
    ctx.beginPath();
    ctx.moveTo(canvas.width/2,0);
    ctx.lineTo(canvas.width/2,canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);
}

function movePlayer(){
    if(keys["w"]) player.y-=player.speed;
    if(keys["s"]) player.y+=player.speed;

    if(player.y<0) player.y=0;
    if(player.y+player.height>canvas.height)
        player.y=canvas.height-player.height;
}

function moveCPU(){
    let center = cpu.y + cpu.height/2;

    if(center < ball.y-20)
        cpu.y += cpu.speed;
    else if(center > ball.y+20)
        cpu.y -= cpu.speed;

    cpu.y=Math.max(0,Math.min(canvas.height-cpu.height,cpu.y));
}

function resetBall(direction){
    ball.x=canvas.width/2;
    ball.y=canvas.height/2;
    ball.speed=6;
    ball.dx=direction*ball.speed;
    ball.dy=(Math.random()*6)-3;
}

function collision(paddle){
    return (
        ball.x-ball.size/2 < paddle.x+paddle.width &&
        ball.x+ball.size/2 > paddle.x &&
        ball.y-ball.size/2 < paddle.y+paddle.height &&
        ball.y+ball.size/2 > paddle.y
    );
}

function updateBall(){

    ball.x+=ball.dx;
    ball.y+=ball.dy;

    if(ball.y-ball.size/2<=0 || ball.y+ball.size/2>=canvas.height){
        ball.dy*=-1;
    }

    if(collision(player) && ball.dx<0){
        let collidePoint = ball.y-(player.y+player.height/2);
        collidePoint/=player.height/2;

        let angle = collidePoint*Math.PI/4;
        ball.speed+=0.4;

        ball.dx=ball.speed*Math.cos(angle);
        ball.dy=ball.speed*Math.sin(angle);
    }

    if(collision(cpu) && ball.dx>0){
        let collidePoint = ball.y-(cpu.y+cpu.height/2);
        collidePoint/=cpu.height/2;

        let angle = collidePoint*Math.PI/4;
        ball.speed+=0.4;

        ball.dx=-ball.speed*Math.cos(angle);
        ball.dy=ball.speed*Math.sin(angle);
    }

    if(ball.x<0){
        cpuScore++;
        cpuScoreEl.textContent=cpuScore;
        checkWinner();
        resetBall(1);
    }

    if(ball.x>canvas.width){
        playerScore++;
        playerScoreEl.textContent=playerScore;
        checkWinner();
        resetBall(-1);
    }
}

function checkWinner(){
    if(playerScore>=10 || cpuScore>=10){
        const winner = playerScore>cpuScore ? "You Win!" : "Computer Wins!";
        alert(winner);

        playerScore=0;
        cpuScore=0;

        playerScoreEl.textContent=0;
        cpuScoreEl.textContent=0;

        resetBall(Math.random()>0.5?1:-1);
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawCenterLine();

    drawRect(player.x,player.y,player.width,player.height,"white");
    drawRect(cpu.x,cpu.y,cpu.width,cpu.height,"white");

    drawBall();
}

function gameLoop(){
    movePlayer();
    moveCPU();
    updateBall();
    draw();

    requestAnimationFrame(gameLoop);
}

resetBall(Math.random()>0.5?1:-1);
gameLoop();
</script>

</body>
</html>
